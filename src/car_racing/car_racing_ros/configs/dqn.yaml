# =============================================================================
# DQN 配置文件
# =============================================================================
# 所有参数都可以通过修改这里的值来调整，无需修改代码

hyperparameters:
  # -------------------------------------------------------------------------
  # 网络结构 (这些参数目前未被代码使用，仅供参考)
  # -------------------------------------------------------------------------
  conv_channels: [16, 32]       # CNN 通道数 [第一层, 第二层]
  fc_sizes: [256]               # 全连接层大小
  
  # -------------------------------------------------------------------------
  # 学习参数
  # -------------------------------------------------------------------------
  lr: 0.0001                    # 学习率 (learning rate)
                                 # 控制每次更新的步长
                                 # 太大: 训练不稳定
                                 # 太小: 收敛太慢
                                 # 推荐范围: 0.0001 ~ 0.001
  
  gamma: 0.99                   # 折扣因子 (discount factor)
                                 # 决定未来奖励的重要性
                                 # 接近1: 重视长期收益
                                 # 接近0: 只重视即时奖励
                                 # 推荐: 0.99
  
  batch_size: 64                # 批大小 (batch size)
                                 # 每次更新使用的样本数量
                                 # 太大: 内存占用高，训练变慢
                                 # 太小: 梯度估计不准确
                                 # 推荐: 32 ~ 128
  
  buffer_size: 100000           # 经验回放缓冲区大小
                                 # 存储的最近经验数量
                                 # 更大的缓冲区可以存储更多历史经验
                                 # 但会占用更多内存
  
  # -------------------------------------------------------------------------
  # 探索参数 (ε-greedy 策略)
  # -------------------------------------------------------------------------
  epsilon_start: 1.0            # 初始探索率
                                 # 1.0 = 100% 随机探索
                                 # 开始时完全随机，探索环境
  
  epsilon_decay: 0.9999         # 探索率衰减系数
                                 # 每更新一次，epsilon *= epsilon_decay
                                 # 接近1: 衰减慢，需要更多探索
                                 # 太接近1会导致训练变慢
                                 # 计算: 1.0 * 0.9999^10000 ≈ 0.368
  
  epsilon_min: 0.01              # 最小探索率
                                 # epsilon 不会低于这个值
                                 # 保持一定的探索，防止陷入局部最优
  
  # -------------------------------------------------------------------------
  # 训练调度
  # -------------------------------------------------------------------------
  warmup_steps: 10000           # 预热步数 (当前代码未使用)
                                 # 开始训练前随机探索的步数
                                 # 确保回放缓冲区有足够的样本
  
  target_update: 5000           # 目标网络更新频率
                                 # 每隔多少步同步一次目标网络
                                 # 太小: 训练不稳定
                                 # 太大: 学习变慢
                                 # 推荐: 5000 ~ 10000
  
  train_freq: 4                 # 训练频率
                                 # 每隔多少步训练一次
                                 # 4 = 每4步训练一次
                                 # 推荐: 4 (经典 Atari 设置)

  dueling: true
  amp: true
  normalize_obs: true
  double_q: false
  max_grad_norm: 10.0
