# =============================================================================
# Double DQN 配置文件
# =============================================================================
# 继承自 dqn.yaml 的配置，此文件仅包含 DoubleDQN 特有的参数

hyperparameters:
  # -------------------------------------------------------------------------
  # Double DQN 特有参数
  # -------------------------------------------------------------------------
  
  tau: 0.005                    # 软更新系数 (soft update coefficient)
                                 # 用于平滑更新目标网络
                                 # target = τ * policy + (1-τ) * target
                                 # 越小: 目标网络更新越平滑
                                 # 推荐: 0.001 ~ 0.01
  
  update_target_every: 10000    # 软更新间隔
                                 # 每隔多少步执行一次软更新
                                 # 注意: DoubleDQN 使用软更新，不需要硬同步
                                 # 推荐: 10000
  
  # -------------------------------------------------------------------------
  # 训练稳定性增强 (可选)
  # -------------------------------------------------------------------------
  
  max_grad_norm: 10.0           # 梯度裁剪阈值
                                 # 防止梯度爆炸
                                 # 如果梯度的L2范数超过此值，会被缩放
                                 # 推荐: 5.0 ~ 20.0
  
  # -------------------------------------------------------------------------
  # 学习率调度器 (可选)
  # -------------------------------------------------------------------------
  
  scheduler_type: step          # 调度器类型
                                 # step: 步进衰减
                                 # cosine: 余弦退火
                                 # None: 不使用调度器
  
  scheduler_step: 10000         # 步进调度的步长
                                 # 每隔多少步衰减一次学习率
  
  scheduler_gamma: 0.9          # 衰减系数
                                 # lr = lr * gamma
  
  # -------------------------------------------------------------------------
  # 其他高级参数 (当前版本未使用)
  # -------------------------------------------------------------------------
  
  # epsilon_decay_type: exponential  # epsilon 衰减类型
                                    # exponential: 指数衰减
                                    # linear: 线性衰减

  dueling: true
  amp: true
  normalize_obs: true
